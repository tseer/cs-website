---
layout: default
table-count: 5
---
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "@id": {{ page.url | absolute_url | append: "#department" | jsonify }},
  "name": {{ site.department_name | default: site.title | jsonify }},
  "url": {{ page.url | absolute_url | jsonify }},
  "description": {{ site.description | strip_html | normalize_whitespace | jsonify }},
  "parentOrganization": {
    "@type": "CollegeOrUniversity",
    "@id": "https://www.umb.edu/#organization",
    "name": {{ site.organization_name | jsonify }},
    "url": "https://www.umb.edu/"
  }
}
</script>
<div class="home-back">

  <div class="home-back-slide">
    <div class="home-back-slide-cover">
      <div class="wrapper">
          {% include slide-carusel.html %}
      </div>
    </div>
  </div>

  <center style='margin-top:10px;'>
  <strong><a href="/info" target=_blank>IMPORTANT INFORMATION FOR ALL CS STUDENTS!</a>&nbsp;</strong>
</center>

  <div class="home-top">
    <div class="wrapper">
      <div class="home">
        {%- if page.title -%}
        <h1 class="page-heading">{{ page.title }}</h1>
        {%- endif -%}
        {% include page-summary.html %}

        <div class="wrap-table">
          {% include table.html %}
        </div>
      </div>

      {% include umass-programms.html %}

      {% include follow-buttons.html %}
    </div>
  </div>
</div>

<script src="{{ '/WEB/javascript/home.js' | relative_url }}"></script>
