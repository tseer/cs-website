---
layout: default
table-count: 4
---
<div class="wrapper">
  <article class="post">
    {% unless page.layout == "course" %}
    <header class="post-header">
      <h1 class="post-title">{{ page.title | escape }}</h1>
    </header>
    {% endunless %}
    
    <div class="post-content">
      {{ content }}
    </div>
  </article>
</div>
