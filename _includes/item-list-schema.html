<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "ItemList",
  "name": {{ include.name | jsonify }},
  "url": {{ include.url | absolute_url | jsonify }}{% if include.description %},
  "description": {{ include.description | jsonify }}{% endif %},
  "itemListElement": [
    {% for item in include.items %}
    {% assign item_name = item.name | default: item.title %}
    {% if item.url %}
    {% assign item_url = item.url %}
    {% else %}
    {% assign item_url = item.link | prepend: "/" %}
    {% endif %}
    {
      "@type": "ListItem",
      "position": {{ item.position | default: forloop.index }},
      "name": {{ item_name | jsonify }},
      "url": {{ item_url | absolute_url | jsonify }}
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ]
}
</script>
