<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  {%- seo -%}
  <link rel="stylesheet" href="{{ 'WEB/assets/main.css' | relative_url }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  {%- feed_meta -%}

  {%- if page.description -%}
    <meta name="description" content="{{ page.description | strip_html | strip_newlines | escape }}">
  {%- endif -%}

  {%- if page.keywords -%}
    <meta name="keywords" content="{{ page.keywords | join: ', ' | escape }}">
  {%- endif -%}

  {%- if page.layout == 'course' -%}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Course",
    "name": "{{ page.course_code }}: {{ page.course_name | escape }}",
    "description": {{ page.description | jsonify }},
    "provider": {
      "@type": "CollegeOrUniversity",
      "name": "University of Massachusetts Boston",
      "department": "Computer Science Department"
    }
  }
  </script>
  {%- endif -%}

  {%- if jekyll.environment == 'production' and site.google_analytics -%}
    {%- include google-analytics.html -%}
  {%- endif -%}
</head>
