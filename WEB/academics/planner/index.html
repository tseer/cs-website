---
layout: none
permalink: /planner
---
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS Prerequisite Chart</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #121212; 
            color: #c9d1d9;
            overflow: hidden;
            height: 100vh;
        }

        #cy {
            width: 100%;
            height: 100vh;
            display: block;
        }

        #info {
            position: absolute;
            top: 0;
            right: 0;
            width: 400px;
            height: 100vh;
            background-color: #1A1A1A; 
            border-left: 1px solid #2A2A2A;
            overflow-y: auto;
            box-sizing: border-box;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display:flex;
            flex-direction: column;
        }

        #info.active {
            transform: translateX(0);
        }

        .info-heading {
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .info-heading h1 {
            font-size: 28px;
            color: #ffffff;
            margin: 0 0 4px 0;
        }

        .info-heading p {
            font-size: 15px;
            color: #f4faff;
            margin: 0;
        }

        .close-button {
            background: none;
            border: none;
            color: #8b949e;
            font-size: 24px;
            cursor: pointer;
        }

        .close-button:hover {
            color: #ffffff;
        }
        .info-content {
            flex-grow: 1;
            padding: 0 24px;
        }

        .section {
            border-top: 1px solid #2A2A2A;
            padding: 20px 0;
        }

        .section-title {
            font-size: 12px;
            font-weight: 600;
            color: #6e7681;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin: 0 0 12px 0;
        }

        .credits {
            display: inline-block;
            background-color: #1d1e1f;
            border: 1px solid #2A2A2A;
            color: #e6edf3;
            padding: 6px 12px;
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
        }

        .description-text {
            font-size: 15px;
            line-height: 1.6;
            color: #e6edf3;
            margin: 0;
        }

        .prereq-text {
            display: inline-flex;
            align-items: center;
            background-color: #1d1e1f;
            border: 1px solid #2A2A2A;
            color: #e6edf3;
            padding: 6px 12px;
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
        }
        
        .prereq-text span { margin-right: 6px; }

        .unlocks-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .class-card { background: #1e1e1e; padding: 15px; margin-top: 10px; border-radius: 8px; border: 1px solid #333333;}
        .class-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .class-section { font-weight: 600; font-size: 15px; color: #ffffff; }
        .class-number { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #8b949e; background: #161b22; padding: 4px 8px; border-radius: 4px; }
        .class-detail { display: flex; align-items: flex-start; gap: 10px; color: #c9d1d9; font-size: 14px; margin-bottom: 10px; }
        .class-detail:last-child { margin-bottom: 0; }
        .class-detail svg { flex-shrink: 0; margin-top: 2px; color: #8b949e; width: 16px; height: 16px; }
        .class-detail-text { display: flex; flex-direction: column; line-height: 1.4; }

        .course-tag {
            display: inline-flex;
            align-items: center;
            background-color: #1A1A1A;
            border: 1px solid #2A2A2A;
            color: #e6edf3;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 13px;
        }
        .info-footer {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-top: 1px solid #2A2A2A;
        }

        .button {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
            background-color: transparent;
            border: 1px solid #2A2A2A;
            color: #c9d1d9;
        }
        .button:hover { background-color: #2A2A2A; }

        
        .button-complete.is-completed {
            border-color: #2ea043;
            color: #2ea043;
        }

        .zoom-controls {
            position: absolute;
            bottom: 40px;
            left: 40px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 6px;
            background-color: rgba(26, 26, 26, 0.85);           
            padding: 8px;
            border-radius: 12px;
            border: 1px solid #333333;
        }

        .zoom-button {
            width: 36px;
            height: 36px;
            background-color: transparent;
            border: none;
            color: #8b949e;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .zoom-button:hover {
            background-color: #2A2A2A;
            color: #ffffff;
        }
    </style>
</head>

<body>
    <div class="zoom-controls">
        <button class="zoom-button" id="zoom-in-button" title="Zoom In">+</button>
        <button class="zoom-button" id="zoom-out-button" title="Zoom Out">−</button>
        <button class="zoom-button" id="center-button" title="Center Chart" style="font-size: 14px;">⊕</button>
    </div>
    <div id="cy"></div>

    <div id="info">
        <div class="info-heading">
            <div>
                <h1 id="courseId">CS 110</h1>
                <p id="courseName">Intro to Computing</p>
            </div>
            <button class="close-button" id="close-info">&times;</button>
        </div>

        <div class="info-content">
            <button class="button button-complete" id="button-complete" style="margin-bottom: 20px;">Mark as Completed</button>
            
            <div class="section">
                <h3 class="section-title">Credits</h3>
                <div class="credits">3 credits</div>
            </div>

            <div class="section" id="description-section">
                <h3 class="section-title">Description</h3>
                <p class="description-text" id="side-description">Description text goes here.</p>
            </div>

            <div class="section" id="prereq-section">
                <h3 class="section-title">Prerequisites</h3>
                <div class="prereq-text" id="side-prereq"><span>✓</span> MATH130</div>
            </div>

            <div class="section" id="unlocks-section">
                <h3 class="section-title">Unlocks These Courses</h3>
                <div class="unlocks-container" id="side-unlocks"></div>
            </div>

            <div class="section" id="offered-section" style="display: none;">
                <h3 class="section-title" style="margin-bottom: 16px;">Offered In:</h3>
                <div id="side-offered"></div>
            </div>
        </div>

        <div class="info-footer">
            <button class="button">Open Course Page</button>
        </div>
    </div>

    <script>
        fetch('/WEB/academics/planner/prerequisites.json?v=' + new Date().getTime())
            .then(res => res.json())
            .then(data => {
                const cy = cytoscape({
                    container: document.getElementById('cy'),
                    elements: {
                        nodes: data.nodes,
                        edges: data.edges
                    },
                    layout: { name: 'preset', fit: false },
                    zoom: 0.669,
                    pan: { x: 800, y: 300 },

                    style: [
                        {
                            selector: 'node:childless',
                            style: {
                                'shape': 'round-rectangle',
                                'background-color': '#1e1e1e',
                                'border-width': 1,
                                'border-color': '#3a3a3a',
                                'color': '#ffffff',
                                'label': function(ele) {
                                    var id = ele.data('id');
                                    var name = ele.data('name');
                                    return name ? id + '\n' + name : id;
                                },
                                'text-wrap': 'wrap',
                                'text-valign': 'center',
                                'text-halign': 'center',
                                'width': 'label',
                                'height': 'label',
                                'padding': '14px',
                                'text-max-width': '140px',
                                'font-family': 'Inter, sans-serif',
                                'font-size': '15px',
                                'line-height': 1.4,
                                'transition-property': 'background-color, border-color, opacity',
                                'transition-duration': '0.2s'
                            }
                        },
                        {
                            selector: 'node:parent',
                            style: {
                                'background-opacity': 0,
                                'background-color': 'transparent',
                                'border-width': 1,
                                'border-color': '#2a2a2a',
                                'shape': 'rectangle',
                                'label': 'data(name)',
                                'font-family': 'Inter, sans-serif',
                                'color': '#999999',
                                'text-valign': 'top',
                                'text-halign': 'center',
                                'font-size': '14px',
                                'padding': '20px',
                                'text-margin-y': -8
                            }
                        },
                        {
                            selector: 'edge',
                            style: {
                                'width': 1.5,
                                'line-color': '#404040',
                                'target-arrow-color': '#404040',
                                'target-arrow-shape': 'triangle',
                                'curve-style': 'bezier',
                                'transition-property': 'line-color, target-arrow-color, opacity, width',
                                'transition-duration': '0.2s'
                            }
                        },
                        {
                            selector: 'edge.coreq',
                            style: {
                                'line-style': 'dashed',
                                'line-dash-pattern': [6, 4],
                                'label': 'Pre/Co Req',
                                'font-family': 'Inter, sans-serif',
                                'font-size': '10px',
                                'color': '#8b949e',
                                'text-background-color': '#0d1117',
                                'text-background-opacity': 1,
                                'text-background-padding': '2px'
                            }
                        },
                        {
                            selector: 'edge.bend-left',
                            style: { 'curve-style': 'unbundled-bezier', 'control-point-distances': -90, 'control-point-weights': 0.5 }
                        },
                        {
                            selector: 'edge.bend-right',
                            style: { 'curve-style': 'unbundled-bezier', 'control-point-distances': 90, 'control-point-weights': 0.5 }
                        },
                        {
                            selector: 'node.hover-node',
                            style: {
                                'border-color': '#ffffff',
                                'border-width': 1
                            }
                        },
                        {
                            selector: 'node.selected-path',
                            style: {
                                'border-color': '#ffffff',
                                'border-width': 1.5
                            }
                        },
                        {
                            selector: 'edge.selected-path, edge.completed-path',
                            style: {
                                'line-color': '#ffffff',
                                'target-arrow-color': '#ffffff',
                                'width': 2.5,
                                'z-index': 99
                            }
                        },
                        {
                            selector: 'edge.selected-partial',
                            style: {
                                'line-color': '#ffffff',
                                'target-arrow-color': '#ffffff',
                                'width': 2.5,
                                'line-style': 'dashed',
                                'line-dash-pattern': [6, 4],
                                'z-index': 99
                            }
                        },
                        {
                            selector: 'edge.completed-partial',
                            style: {
                                'line-color': '#ffffff',
                                'target-arrow-color': '#ffffff',
                                'width': 2.5,
                                'line-style': 'dashed',
                                'line-dash-pattern': [6, 4],
                                'z-index': 99
                            }
                        },
                        {
                            selector: 'node.completed',
                            style: {
                                'border-color': '#2ea043',
                                'border-width': 2
                            }
                        }
                    ],
                    minZoom: 0.4,
                    maxZoom: 5
                });

                let completedCourses = new Set(JSON.parse(localStorage.getItem('completedCourses') || '[]'));
                let selectedNodeId = null;
                const courseCache = {};

                const sidebar = document.getElementById('info');
                const closeButton = document.getElementById('close-info');
                const courseId = document.getElementById('courseId');
                const courseName = document.getElementById('courseName');
                const descriptionSection = document.getElementById('description-section');
                const description = document.getElementById('side-description');
                const prereqSection = document.getElementById('prereq-section');
                const prereq = document.getElementById('side-prereq');
                const unlocksSection = document.getElementById('unlocks-section');
                const unlocksList = document.getElementById('side-unlocks');
                const completeButton = document.getElementById('button-complete');

                const updateLineStyle = (node, solidClass, dashedClass) => {
                    node.outgoers('edge').forEach(edge => {
                        const target = edge.target();
                        const otherPrereqs = target.incomers('node').difference(node);
                        const prereqsMet = otherPrereqs.every(p => completedCourses.has(p.id()));
                        edge.addClass(otherPrereqs.length > 0 && !prereqsMet ? dashedClass : solidClass);
                    });
                };

                function closeSidebar() {
                    sidebar.classList.remove('active');
                    selectedNodeId = null;
                    cy.elements().removeClass('selected-path selected-partial');
                }

                const applyCompletionStyles = () => {
                    cy.nodes().removeClass('completed');
                    cy.edges().removeClass('completed-path completed-partial');
                    cy.nodes().forEach(node => {
                        if (completedCourses.has(node.id())) {
                            node.addClass('completed');
                            updateLineStyle(node, 'completed-path', 'completed-partial');
                        }
                    });
                };
                applyCompletionStyles();

                cy.on('mouseover', 'node', function(e) {
                    let node = e.target;
                    if (node.isParent()) return;
                    node.addClass('hover-node');
                });

                cy.on('mouseout', 'node', function(e) {
                    cy.elements().removeClass('hover-node');
                });

                cy.on('tap', 'node', function(e){
                    let node = e.target;
                    if (node.isParent()) return;

                    selectedNodeId = node.id();
                    
                    cy.elements().removeClass('selected-path selected-partial');
                    
                    node.addClass('selected-path');
                    node.outgoers('node').addClass('selected-path');
                    
                    updateLineStyle(node, 'selected-path', 'selected-partial');

                    courseId.innerHTML = node.data('name') || node.id();
                    courseName.innerHTML = node.id();

                    if (node.data('description')) {
                        description.innerHTML = node.data('description');
                        descriptionSection.style.display = 'block';
                    } else {
                        descriptionSection.style.display = 'none';
                    }

                    if (node.data('prereq_text')) {
                        prereq.innerHTML = node.data('prereq_text').replace('Pre-requisite: ', '');
                        prereqSection.style.display = 'block';
                    } else {
                        prereqSection.style.display = 'none';
                    }
                
                    const immediateTargets = node.outgoers('node').filter(t => !t.isParent());
                    unlocksList.innerHTML = '';
                    if (immediateTargets.length > 0) {
                        unlocksSection.style.display = 'block';
                        immediateTargets.forEach(target => {
                            const tag = document.createElement('div');
                            tag.className = 'course-tag';
                            tag.textContent = target.id();
                            unlocksList.appendChild(tag);
                        });
                    } else {
                        unlocksSection.style.display = 'none';
                    }

                    if (completedCourses.has(selectedNodeId)) {
                        completeButton.classList.add('is-completed');
                        completeButton.innerHTML = 'Completed';
                    } else {
                        completeButton.classList.remove('is-completed');
                        completeButton.innerHTML = 'Mark as Completed';
                    }

                    fetchLiveCourseData(selectedNodeId);

                    sidebar.classList.add('active');
                });

                closeButton.addEventListener('click', closeSidebar);

                cy.on('tap', function(e){
                    if( e.target === cy ){
                        closeSidebar();
                    }
                });

                completeButton.addEventListener('click', () => {
                    if (!selectedNodeId) return;
                    if (completedCourses.has(selectedNodeId)) {
                        completedCourses.delete(selectedNodeId);
                        completeButton.classList.remove('is-completed');
                        completeButton.innerHTML = 'Mark as Completed';
                    } else {
                        completedCourses.add(selectedNodeId);
                        completeButton.classList.add('is-completed');
                        completeButton.innerHTML = 'Completed';
                    }
                    localStorage.setItem('completedCourses', JSON.stringify([...completedCourses]));
                    applyCompletionStyles();
                });

                document.getElementById('zoom-in-button').addEventListener('click', () => {
                    cy.zoom({
                        level: cy.zoom() * 1.2,
                        renderedPosition: { x: cy.width() / 2, y: cy.height() / 2 }
                    });
                });

                document.getElementById('zoom-out-button').addEventListener('click', () => {
                    cy.zoom({
                        level: cy.zoom() * 0.8,
                        renderedPosition: { x: cy.width() / 2, y: cy.height() / 2 }
                    });
                });

                document.getElementById('center-button').addEventListener('click', () => {
                    cy.fit(null, 50); 
                });                
                
                // --- This function helps get course scheules data from the UMB website course catalog ---
                function fetchLiveCourseData(courseId) {
                    const offeredSection = document.getElementById('offered-section');
                    const offeredContainer = document.getElementById('side-offered');
                    
                    offeredSection.style.display = 'none';
                    offeredContainer.innerHTML = '';
                    
                    let match = courseId.match(/^([A-Za-z]+)\s*(\d+[A-Za-z]?)$/);
                    if (!match) return; 
                    
                    offeredSection.style.display = 'block';

                    if (courseCache[courseId]) {
                        offeredContainer.innerHTML = courseCache[courseId];
                        return;
                    }

                    let subject = match[1].toLowerCase();
                    let number = match[2];
                    let url = `https://courses.umb.edu/course_catalog/course_info/ugrd_${subject}_all_${number}`;
                    
                    offeredContainer.innerHTML = '<div style="color:#8b949e; font-size: 13px;">Loading live schedule...</div>';
                    
                    fetch(url)
                        .then(res => res.text())
                        .then(htmlStr => {
                            const parser = new DOMParser();
                            const doc = parser.parseFromString(htmlStr, 'text/html');
                            let htmlOut = '';
                            let h3Tags = doc.querySelectorAll('h3');
                            let foundAny = false;

                            h3Tags.forEach(h3 => {
                                let termText = h3.innerText.trim();
                                if (termText.startsWith('Course #')) return;
                                
                                let table = h3.nextElementSibling;
                                if (table && table.tagName.toLowerCase() === 'table') {
                                    let rows = table.querySelectorAll('tr.class-info-rows');
                                    if (rows.length > 0) {
                                        foundAny = true;
                                        let mt = foundAny && htmlOut !== '' ? '16px' : '0';
                                        htmlOut += `<div style="font-weight: 600; font-size: 16px; color: #ffffff; margin-bottom: 12px; margin-top: ${mt}; border-bottom: 1px solid #2a2a2a; padding-bottom: 8px;">${termText}</div>`;
                                        
                                        rows.forEach(row => {
                                            const sec = row.querySelector('td[data-label="Section"]')?.innerText.trim() || 'N/A';
                                            const cnum = row.querySelector('td[data-label="Class Number"]')?.innerText.trim() || 'N/A';
                                            const timeHtml = row.querySelector('td[data-label="Schedule/Time"]')?.innerHTML.trim() || 'TBA';
                                            const inst = row.querySelector('td[data-label="Instructor"]')?.innerText.trim() || 'Staff';
                                            const loc = row.querySelector('td[data-label="Location"]')?.innerText.trim() || 'TBA';
                                            
                                            htmlOut += `
                                            <div class="class-card">
                                                <div class="class-header">
                                                    <div class="class-section">Section ${sec}</div>
                                                    <div class="class-number">#${cnum}</div>
                                                </div>
                                                <div class="class-detail">
                                                    <i data-lucide="clock"></i>
                                                    <div class="class-detail-text">${timeHtml}</div>
                                                </div>
                                                <div class="class-detail">
                                                    <i data-lucide="user"></i>
                                                    <div class="class-detail-text">${inst}</div>
                                                </div>
                                                <div class="class-detail">
                                                    <i data-lucide="map-pin"></i>
                                                    <div class="class-detail-text">${loc}</div>
                                                </div>
                                            </div>`;
                                        });
                                    }
                                }
                            });
                            
                            if (!foundAny) {
                                let errorHtml = '<div style="color:#8b949e; font-size: 13px;">Not offered this semester.</div>';
                                offeredContainer.innerHTML = errorHtml;
                                courseCache[courseId] = errorHtml;
                                return;
                            }
                            offeredContainer.innerHTML = htmlOut;
                            courseCache[courseId] = htmlOut;
                            lucide.createIcons();
                        })
                        .catch(err => {
                            offeredContainer.innerHTML = '<div style="color:#ff7b72; font-size: 13px;">Error loading schedule.</div>';
                        });
                }
            });
    </script>
</body>
</html>
